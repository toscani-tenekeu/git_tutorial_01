<!DOCTYPE html>
<html lang="fr">
    <head>

        <meta charset="UTF-8">

    </head>
    <body>

            <p class="titre">BIENVENUE</p>
            <div class="champs-de-saisie">

                <input type="email" name="email" placeholder="Entrer votre email"><br>

        </form>
    </body>
